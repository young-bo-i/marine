name: Build (macOS + Windows)

# 手动触发出可下载产物；打 v* tag 时额外发一个 GitHub Release。
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
            artifact: macos-arm64
            bundles: app,dmg
          - os: windows-latest
            artifact: windows-x64
            bundles: nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: donut

    steps:
      - uses: actions/checkout@v4

      # pnpm 版本取自 donut/package.json 的 packageManager 字段（pnpm@11.2.2）。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: donut/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.2.2 requires Node >= 22.13
          cache: pnpm
          cache-dependency-path: donut/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: donut/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri build 会自动：copy-proxy-binary（首缺时会 cargo build --bin donut-proxy）
      # + next build（beforeBuildCommand）。DONUT_BROWSER_VAULT_PASSWORD 有 build.rs 默认值，无需注入。
      # 未配 Apple/Windows 签名 → 产物为未签名/ad-hoc（内部测试可用，见下）。
      - name: Build Tauri app
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marine-${{ matrix.artifact }}
          path: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
