name: Build (macOS + Windows)

# 手动触发出可下载产物；打 v* tag 时额外发一个 GitHub Release。
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
            artifact: macos-arm64
            bundles: app,dmg
            shell: bash
          - os: windows-latest
            artifact: windows-x64
            bundles: nsis
            shell: pwsh # PowerShell 7 — supports && (5.1 does not)
    runs-on: ${{ matrix.os }}
    # STABLE_RELEASE flips the app out of "nightly" update mode so the in-app
    # auto-updater compares semver against our v* GitHub releases (built from the
    # tag via GITHUB_REF_NAME) instead of looking for nightly-* tags.
    env:
      STABLE_RELEASE: "1"
    defaults:
      run:
        working-directory: donut

    steps:
      - uses: actions/checkout@v4

      # pnpm 版本取自 donut/package.json 的 packageManager 字段（pnpm@11.2.2）。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: donut/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.2.2 requires Node >= 22.13
          cache: pnpm
          cache-dependency-path: donut/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: donut/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri build 会自动：copy-proxy-binary（首缺时会 cargo build --bin donut-proxy）
      # + next build（beforeBuildCommand）。DONUT_BROWSER_VAULT_PASSWORD 有 build.rs 默认值，无需注入。
      # 未配 Apple/Windows 签名 → 产物为未签名/ad-hoc（内部测试可用，见下）。
      #
      # 用重试包裹：依赖 playwright-rust 的 build.rs 会从 playwright.azureedge.net
      # （正被微软退役、偶发断流）下载 ~41MB 驱动，release 构建不走缓存、无重试，断流即
      # panic（hyper IncompleteBody）——本次 macOS 就是这样挂的，Windows 只是运气好。
      # cargo 会重跑“失败的 build script”，所以重试只重下驱动、复用已编译产物，代价很小。
      # shell 按 OS 取：Windows PowerShell 5.1 不支持 && ，故显式用 pwsh(7)/bash。
      - name: Build Tauri app
        uses: nick-fields/retry@v3
        with:
          max_attempts: 4
          retry_wait_seconds: 30
          retry_on: error
          timeout_minutes: 90
          shell: ${{ matrix.shell }}
          command: cd donut && pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marine-${{ matrix.artifact }}
          path: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
