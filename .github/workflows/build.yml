name: Build (macOS + Windows)

# 手动触发出可下载产物；打 v* tag 时额外发一个 GitHub Release。
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (arm64)
            artifact: macos-arm64
            bundles: app,dmg
            shell: bash
          - os: windows-latest
            artifact: windows-x64
            bundles: nsis
            shell: pwsh # PowerShell 7 — supports && (5.1 does not)
    runs-on: ${{ matrix.os }}
    # STABLE_RELEASE flips the app out of "nightly" update mode so the in-app
    # auto-updater compares semver against our v* GitHub releases (built from the
    # tag via GITHUB_REF_NAME) instead of looking for nightly-* tags.
    env:
      STABLE_RELEASE: "1"
      # macOS code-signing identity (a stable self-signed cert). Tauri signs the
      # .app with this so its TCC identity is stable across builds → the OS keeps
      # granted camera/mic/etc. permissions after an auto-update instead of
      # re-prompting. Empty when the secret isn't set → falls back to ad-hoc.
      APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
    defaults:
      run:
        working-directory: donut

    steps:
      - uses: actions/checkout@v4

      # pnpm 版本取自 donut/package.json 的 packageManager 字段（pnpm@11.2.2）。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: donut/package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.2.2 requires Node >= 22.13
          cache: pnpm
          cache-dependency-path: donut/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: donut/src-tauri -> target

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: donut/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('donut/pnpm-lock.yaml') }}-${{ hashFiles('donut/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('donut/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Import the stable self-signed cert into a keychain so Tauri can sign the
      # macOS .app with a build-invariant identity (→ TCC permissions survive
      # auto-updates). No-op (ad-hoc build) when the secret isn't configured.
      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "MACOS_CERT_P12 not set — building ad-hoc (unsigned). Add the secret to enable stable signing."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/marine-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 20)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Prepend our keychain to the user search list so codesign resolves the identity by name.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["[:space:]]//g')
          # Trust the cert for code signing so `security find-identity -v -p codesigning` treats it as valid.
          openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$MACOS_CERT_PASSWORD" -clcerts -nokeys -legacy -out "$RUNNER_TEMP/cert.pem" 2>/dev/null \
            || openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -passin pass:"$MACOS_CERT_PASSWORD" -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$RUNNER_TEMP/cert.pem" || echo "add-trusted-cert failed (codesign -s still works untrusted)"
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/cert.pem"
          echo "Signing identities:"; security find-identity -v -p codesigning "$KEYCHAIN" || true

      # On a v* tag, force app version = tag so filename / About / updater agree.
      - name: Sync version to tag
        run: node scripts/ci-set-version.mjs

      # tauri build 会自动：copy-proxy-binary（首缺时会 cargo build --bin donut-proxy）
      # + next build（beforeBuildCommand）。DONUT_BROWSER_VAULT_PASSWORD 有 build.rs 默认值，无需注入。
      # 未配 Apple/Windows 签名 → 产物为未签名/ad-hoc（内部测试可用，见下）。
      #
      # 用重试包裹：依赖 playwright-rust 的 build.rs 会从 playwright.azureedge.net
      # （正被微软退役、偶发断流）下载 ~41MB 驱动，release 构建不走缓存、无重试，断流即
      # panic（hyper IncompleteBody）——本次 macOS 就是这样挂的，Windows 只是运气好。
      # cargo 会重跑“失败的 build script”，所以重试只重下驱动、复用已编译产物，代价很小。
      # shell 按 OS 取：Windows PowerShell 5.1 不支持 && ，故显式用 pwsh(7)/bash。
      - name: Build Tauri app
        uses: nick-fields/retry@v3
        with:
          max_attempts: 4
          retry_wait_seconds: 30
          retry_on: error
          timeout_minutes: 90
          shell: ${{ matrix.shell }}
          command: cd donut && pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marine-${{ matrix.artifact }}
          path: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Attach to Release (on v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            donut/src-tauri/target/release/bundle/dmg/*.dmg
            donut/src-tauri/target/release/bundle/nsis/*.exe
