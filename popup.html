<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="hero">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M2 8c3 0 3 2 6 2s3-2 6-2 3 2 6 2"></path>
          <path d="M2 14c3 0 3 2 6 2s3-2 6-2 3 2 6 2"></path>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">Marine</div>
        <div class="brand-sub">字幕 · 评论 · 正文</div>
      </div>
    </div>
    <div id="platform" class="badge">检测中…</div>
  </header>

  <main class="body">
    <!-- 抓取 -->
    <section id="pane-grab" class="pane active">
      <button id="btn-grab" class="cta">
        <svg class="i" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.7 4.6L18 8l-4.3 1.4L12 14l-1.7-4.6L6 8l4.3-1.4z"></path><path d="M18 14l.9 2.4L21 17l-2.1.7L18 20l-.9-2.3L15 17l2.1-.6z"></path></svg>
        一键抓取
      </button>

      <div class="cards">
        <div class="card">
          <div class="ic ic-sub"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M7 11h4M7 15h8M15 11h2"></path></svg></div>
          <div class="card-main"><div class="card-t">字幕</div><div class="card-s">视频字幕轨</div></div>
          <div id="st-sub" class="chip pending">待获取</div>
        </div>

        <div class="card">
          <div class="ic ic-cmt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8 8 0 0 1-11.6 7.1L4 20l1.4-5A8 8 0 1 1 21 11.5z"></path></svg></div>
          <div class="card-main">
            <div class="card-t">评论 <button id="btn-more" class="more hidden">加载更多</button></div>
            <div class="card-s">页面评论</div>
          </div>
          <div id="st-comment" class="chip pending">待获取</div>
        </div>

        <div class="card">
          <div class="ic ic-txt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6v20h12V8z"></path><path d="M14 2v6h6M9 13h6M9 17h6"></path></svg></div>
          <div class="card-main"><div class="card-t">结构化文本</div><div class="card-s">正文 Markdown</div></div>
          <div id="st-text" class="chip pending">待获取</div>
        </div>
      </div>

      <div class="row">
        <button id="btn-copy" class="icon-btn" disabled title="复制全部内容" aria-label="复制全部内容">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg>
        </button>
        <button id="btn-codex" class="cta-2" disabled>
          <svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="11" rx="2.5"></rect><path d="M12 8V4.5M8.5 13h.01M15.5 13h.01"></path></svg>
          本地智能体
        </button>
      </div>
      <span id="grab-status" class="status">点「一键抓取」开始检测本页内容</span>

      <div id="reload-hint" class="hint hidden">
        本页未注入脚本（扩展更新后已打开的页面需刷新一次）。<button id="btn-reload" class="link">刷新并重试</button>
      </div>
    </section>

    <!-- 配置 -->
    <section id="pane-config" class="pane">
      <div class="field-label">当前品牌</div>
      <div class="brand-pill"><span class="dot"></span>scholay</div>

      <div class="field-label cfg-gap">Skills</div>
      <label class="upload">
        <input id="skill-file" type="file" accept=".md,.markdown,.json,.txt" multiple hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"></path><path d="M5 16v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"></path></svg>
        <span class="upload-t">上传 Skill 文件</span>
        <span class="upload-sub">点击选择 · 支持 .md / .json / .txt</span>
      </label>
      <ul id="skill-list" class="skill-list"></ul>

      <div class="note">上传并启用的 Skill 会在「本地智能体」打包时一并带给 Codex；都不启用则用扩展内置的 <code>skills/scholay/</code>。打包文件 <code>marine_&lt;时间戳&gt;.md</code> 写到「下载」，Codex 按其真实路径读取，输出直评 + 回复。</div>
    </section>

    <!-- 调试 -->
    <section id="pane-debug" class="pane">
      <label class="switch"><input type="checkbox" id="debug-toggle"> 在页面上显示调试面板</label>
      <div class="note">在页面右下角浮层实时显示抓取 / 捕获 / 对接日志，便于排查问题。</div>
    </section>
  </main>

  <nav class="tabbar">
    <button class="tabbtn active" data-tab="grab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"></path></svg>抓取</button>
    <button class="tabbtn" data-tab="config"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path><circle cx="9" cy="7" r="2" fill="var(--bg)"></circle><circle cx="15" cy="12" r="2" fill="var(--bg)"></circle><circle cx="8" cy="17" r="2" fill="var(--bg)"></circle></svg>配置</button>
    <button class="tabbtn" data-tab="debug"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"></path></svg>调试</button>
  </nav>

  <script src="src/zip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
